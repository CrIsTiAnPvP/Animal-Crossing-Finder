        theme: { extend: {} },
      };
      function initTheme() {
        const savedTheme = localStorage.getItem("theme");

          savedTheme === "dark" ||
          (!savedTheme &&
            window.matchMedia("(prefers-color-scheme: dark)").matches)
        ) {
          document.documentElement.classList.add("dark");
        }
      }
      initTheme();

        sumo: "Harry",
        munchi: "Spork",
        chanchi: "Kevin",
      };

      const topGlobalEn = ["Raymond", "Marshal", "Ankha", "Shino", "Sasha"];

      const i18n = {
        es: {
          title: "Buscador Animal Crossing",
          placeholder: "Ej: Deira, Parches...",
          searchBtn: "Buscar",
          randomTitle: "🎲 Al azar",
          randomSub: "Nuevos amigos",
          topTitle: "🌎 Top Global",
          topSub: "Más buscados",
          connecting: "✈️ Conectando...",
          recent: "🕒 Recientes:",
          createdBy: "🛠️ Creado por",
          notFound: "No encontrado.",
          noFiles: "Sin archivos para",
          filesFound: "Archivos encontrados:",
          download: "⬇️ DESCARGAR",
          searchLink: "Buscar ↗",
          flag: "fi-es",
          langName: "Español",
        },
        en: {
          title: "Animal Crossing	 Finder",
          placeholder: "Ex: Molly, Stitches...",
          searchBtn: "Search",
          randomTitle: "🎲 Random",
          randomSub: "Discover friends",
          topTitle: "🌎 Global Top",
          topSub: "Most searched",
          connecting: "✈️ Connecting...",
          recent: "🕒 Recent:",
          createdBy: "🛠️ Created by",
          notFound: "Not found.",
          noFiles: "No files for",
          filesFound: "Files found:",
          download: "⬇️ DOWNLOAD",
          searchLink: "Search ↗",
          flag: "fi-us",
          langName: "English",
        },
      };

      let currentLang =
        localStorage.getItem("appLang") ||
        (navigator.language.startsWith("es") ? "es" : "en");
      let archivosBBDD = [];
      let busquedasRecientes =
        JSON.parse(localStorage.getItem("amiiboRecientes")) || [];

      const GITHUB_TREE_API =
        "https://api.github.com/repos/AmiiboDB/Amiibo/git/trees/main?recursive=1";
      const TARGET_FOLDER = "Amiibo Bin/Animal Crossing Amiibo/Amiibo Cards";
      const RAW_BASE_URL =
        "https://raw.githubusercontent.com/AmiiboDB/Amiibo/main/";

      function toggleLangMenu(e) {
        e.stopPropagation();
        document.getElementById("langMenuItems").classList.toggle("hidden");
      }
      window.addEventListener("click", () => {
        document.getElementById("langMenuItems").classList.add("hidden");
      });

      function toggleTheme() {
        const isDark = document.documentElement.classList.toggle("dark");
        localStorage.setItem("theme", isDark ? "dark" : "light");
        syncThemeToggle();
      }

      function syncThemeToggle() {
        document.getElementById("themeToggle").checked =
          document.documentElement.classList.contains("dark");
      }

      function changeLang(lang) {
        currentLang = lang;
        localStorage.setItem("appLang", lang);
        aplicarTextosUi();
        renderizarTodo();
        document.getElementById("langMenuItems").classList.add("hidden");
      }

      function aplicarTextosUi() {
        const t = i18n[currentLang];
        document.getElementById("t-title").innerText = t.title;
        document.getElementById("searchInput").placeholder = t.placeholder;
        document.getElementById("searchButton").innerText = t.searchBtn;
        document.getElementById("t-randomTitle").innerText = t.randomTitle;
        document.getElementById("t-randomSub").innerText = t.randomSub;
        document.getElementById("t-topTitle").innerText = t.topTitle;
        document.getElementById("t-topSub").innerText = t.topSub;
        document.getElementById("t-recent").innerText = t.recent;
        document.getElementById("t-createdBy").innerText = t.createdBy;
        document.getElementById("statusMessage").innerText = t.connecting;
        document.getElementById("currentLangFlag").className =
          `fi ${t.flag} rounded-sm`;
        document.getElementById("currentLangText").innerText = t.langName;
      }

      function normalizarTexto(t) {
        return t
          .normalize("NFD")
          .replace(/[\u0300-\u036f]/g, "")
          .toLowerCase()
          .trim();
      }

      function obtenerNombreIngles(input) {
        const norm = normalizarTexto(input);
        if (currentLang === "es") return diccionarioNombres[norm] || null;
        for (const [es, en] of Object.entries(diccionarioNombres))
          if (normalizarTexto(en) === norm) return en;
        return null;
      }

      function obtenerNombreLocal(en) {
        if (currentLang === "en") return en;
        for (const [es, nEn] of Object.entries(diccionarioNombres))
          if (nEn === en) return es.charAt(0).toUpperCase() + es.slice(1);
        return en;
      }

      function renderizarTodo() {
        renderizarTopGlobal();
        renderizarHistorial();
        Array.from(document.getElementById("randomList").children).forEach(
          (c) => {
            const alt = c.querySelector("img").alt;
            c.querySelector(".nombre-p").innerText = obtenerNombreLocal(alt);
            c.querySelector(".link-p").innerText = i18n[currentLang].searchLink;
          },
        );
      }

      function renderizarTopGlobal() {
        const list = document.getElementById("globalTopList");
        list.innerHTML = "";
        topGlobalEn.forEach((n) => crearTarjetaMini(n, list, "top"));
      }

      function renderizarAleatorios() {
        const list = document.getElementById("randomList");
        const vals = Object.values(diccionarioNombres);
        const rands = [];
        while (rands.length < 5) {
          const r = vals[Math.floor(Math.random() * vals.length)];
          if (!rands.includes(r)) rands.push(r);
        }
        list.innerHTML = "";
        rands.forEach((n) => crearTarjetaMini(n, list, "rand"));
      }

      function crearTarjetaMini(nombreEn, cont, pref) {
        const id = `${pref}-${nombreEn.replace(/\s+/g, "-")}`;
        const div = document.createElement("div");
        div.className =
          "flex items-center p-3 bg-white dark:bg-slate-800 border-2 border-[#F4F1EE] dark:border-slate-700 rounded-2xl cursor-pointer hover:border-[#8CBF6E] dark:hover:border-emerald-500 transition-all shadow-sm";
        div.onclick = () => {
          document.getElementById("searchInput").value =
            obtenerNombreLocal(nombreEn);
          buscarAmiibo();
        };
        div.innerHTML = `
                <div class="w-14 h-14 bg-[#F0F5E9] dark:bg-slate-700 rounded-xl p-1.5 mr-4 flex-shrink-0 shadow-inner">
                    <img id="${id}" alt="${nombreEn}" src="https://via.placeholder.com/60x60/E6EFE0/74A35B?text=..." class="w-full h-full object-contain">
                </div>
                <div class="flex flex-col min-w-0">
                    <span class="nombre-p font-bold text-base text-[#5D4A3D] dark:text-slate-200 truncate">${obtenerNombreLocal(nombreEn)}</span>
                    <span class="link-p text-xs text-[#B5A99F] dark:text-slate-500 font-bold uppercase mt-0.5 tracking-tight">${i18n[currentLang].searchLink}</span>
                </div>
            `;
        cont.appendChild(div);
        cargarImagenAmiibo(nombreEn, id);
      }

      function mostrarSugerencias() {
        const val = normalizarTexto(
          document.getElementById("searchInput").value,
        );
        const box = document.getElementById("suggestionsBox");
        if (!val) {
          box.classList.add("hidden");
          return;
        }
        const list =
          currentLang === "es"
            ? Object.keys(diccionarioNombres)
            : Object.values(diccionarioNombres);
        const matches = list
          .filter((n) => normalizarTexto(n).includes(val))
          .slice(0, 6);
        if (matches.length === 0) {
          box.classList.add("hidden");
          return;
        }
        box.innerHTML = matches
          .map(
            (n) =>
              `<div class="px-6 py-3 hover:bg-[#F0F5E9] dark:hover:bg-slate-700 cursor-pointer font-bold dark:text-slate-200 border-b dark:border-slate-700 last:border-0" onclick="document.getElementById('searchInput').value='${n}'; buscarAmiibo();">${n.charAt(0).toUpperCase() + n.slice(1)}</div>`,
          )
          .join("");
        box.classList.remove("hidden");
      }

      async function inicializarApp() {
        aplicarTextosUi();
        syncThemeToggle();
        renderizarAleatorios();
        renderizarTopGlobal();
        renderizarHistorial();
        try {
          const res = await fetch(GITHUB_TREE_API);
          const data = await res.json();
          archivosBBDD = data.tree.filter(
            (i) => i.type === "blob" && i.path.includes(TARGET_FOLDER),
          );
          document.getElementById("searchInput").disabled = false;
          document.getElementById("searchButton").disabled = false;
          document.getElementById("statusMessage").classList.add("hidden");
        } catch (e) {
          console.error(e);
        }
      }

      function buscarAmiibo() {
        const raw = document.getElementById("searchInput").value;
        const resDiv = document.getElementById("results");
        const t = i18n[currentLang];
        document.getElementById("suggestionsBox").classList.add("hidden");

        const enName = obtenerNombreIngles(raw);
        if (!enName) {
          resDiv.innerHTML = `<p class='text-center p-6 bg-red-50 dark:bg-red-900/20 rounded-2xl font-bold'>${t.notFound}</p>`;
          return;
        }

        guardarBusquedaReciente(enName);
        const matches = archivosBBDD.filter((i) =>
          i.path.toLowerCase().includes(enName.toLowerCase()),
        );

        if (matches.length === 0) {
          resDiv.innerHTML = `<p class='text-center p-6 bg-gray-100 dark:bg-slate-800 rounded-2xl'>${t.noFiles} ${obtenerNombreLocal(enName)}</p>`;
          return;
        }

        resDiv.innerHTML = `<h3 class='text-lg font-extrabold text-[#74A35B] dark:text-emerald-400 border-b-2 border-dashed dark:border-slate-700 pb-2 mb-4'>${t.filesFound}</h3>`;

        matches.forEach((a, i) => {
          const file = a.path.split("/").pop();
          const folder = a.path.split("/").slice(-2, -1)[0];
          const url =
            RAW_BASE_URL + a.path.split("/").map(encodeURIComponent).join("/");
          const imgId = `res-${enName.replace(/\s+/g, "-")}-${i}`;

          resDiv.innerHTML += `
            <div class="flex items-center p-5 bg-white dark:bg-slate-800 border-2 border-[#E6EFE0] dark:border-slate-700 rounded-3xl shadow-sm gap-6 relative overflow-hidden group">
                <div class="absolute -right-12 -bottom-12 w-40 h-40 bg-[#ccddb4] dark:bg-slate-900 rounded-full opacity-40 group-hover:scale-110 transition-transform duration-500"></div>
                
                <div class="bg-[#FCFBF8] dark:bg-slate-900 p-2 rounded-2xl border-2 dark:border-slate-700 z-10 shadow-inner">
                    <img id="${imgId}" src="https://via.placeholder.com/100x150?text=..." class="w-20 h-28 object-contain rounded-xl">
                </div>
                
                <div class="flex-grow z-10 min-w-0">
                    <div class="flex items-center gap-2 mb-2 bg-[#E6EFE0] dark:bg-emerald-950 px-3 py-1 rounded-full tracking-wide w-fit">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="#F2C46D" viewBox="0 0 24 24" stroke-width="1.5" stroke="black" class="w-5 h-5">
                          <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 9.776c.112-.017.227-.026.344-.026h15.812c.117 0 .232.009.344.026m-16.5 0a2.25 2.25 0 0 0-1.883 2.542l.857 6a2.25 2.25 0 0 0 2.227 1.932H19.05a2.25 2.25 0 0 0 2.227-1.932l.857-6a2.25 2.25 0 0 0-1.883-2.542m-16.5 0V6A2.25 2.25 0 0 1 6 3.75h3.879a1.5 1.5 0 0 1 1.06.44l2.122 2.12a1.5 1.5 0 0 0 1.06.44H18A2.25 2.25 0 0 1 20.25 9v.776" />
                        </svg>
                        <span class="text-xs font-bold text-[#5C8248] dark:text-emerald-400 uppercase">
                            ${folder}
                        </span>
                    </div>

                    <div class="text-lg font-bold text-[#5D4A3D] dark:text-slate-100 truncate mb-4">${file}</div>
                    
                    <a href="${url}" target="_blank" class="inline-block px-6 py-2.5 bg-[#F2C46D] dark:bg-amber-600 text-[#805B24] dark:text-white font-extrabold text-sm rounded-full shadow-[0_3px_0_#D19B3D] dark:shadow-[0_3px_0_#92400e] active:translate-y-[3px] transition-all">
                        ${t.download}
                    </a>
                </div>
            </div>
        `;
          cargarImagenAmiibo(enName, imgId);
        });
      }

      async function cargarImagenAmiibo(en, id) {
        try {
          const r = await fetch(
            `https://amiiboapi.org/api/amiibo/?name=${encodeURIComponent(en)}`,
          );
          const d = await r.json();
          if (d.amiibo && d.amiibo.length > 0) {
            const ac = d.amiibo.filter((a) =>
              a.amiiboSeries.includes("Animal Crossing"),
            );
            document.getElementById(id).src =
              ac.length > 0 ? ac[0].image : d.amiibo[0].image;
          }
        } catch (e) {
          document.getElementById(id).src =
            "https://via.placeholder.com/100x150?text=Error";
        }
      }

      function renderizarHistorial() {
        const list = document.getElementById("recentSearchesList");
        if (busquedasRecientes.length > 0) {
          document
            .getElementById("recentSearchesContainer")
            .classList.remove("hidden");
          list.innerHTML = busquedasRecientes
            .map(
              (en) =>
                `<button onclick="document.getElementById('searchInput').value='${obtenerNombreLocal(en)}'; buscarAmiibo();" class="px-4 py-1.5 bg-[#FDF8E7] dark:bg-slate-800 text-[#D6A054] dark:text-amber-400 border-2 border-[#F4E3C5] dark:border-slate-700 rounded-full text-sm font-bold shadow-sm hover:scale-105 transition-all">${obtenerNombreLocal(en)}</button>`,
            )
            .join("");
        }
      }

      function guardarBusquedaReciente(en) {
        busquedasRecientes = [
          en,
          ...busquedasRecientes.filter((x) => x !== en),
        ].slice(0, 5);
        localStorage.setItem(
          "amiiboRecientes",
          JSON.stringify(busquedasRecientes),
        );
        renderizarHistorial();
      }

      window.onload = inicializarApp;
    </script>
  </body>
